name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - master
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - master

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore PDF_IT_Yourself.csproj

      - name: Publish Blazor
        run: dotnet publish PDF_IT_Yourself.csproj -c Release -o publish

      - name: Debug published files
        run: |
          echo "=== publish ==="
          find publish -maxdepth 4 -type f | sort
          echo "=== check manifest ==="
          ls -l publish/wwwroot/manifest.json || echo "manifest missing"
          echo "=== manifest link in index ==="
          grep -n "manifest" publish/wwwroot/index.html || true

      - name: Install OIDC Client from Core Package
        run: npm install @actions/core@1.6.0 @actions/http-client

      - name: Get Id Token
        uses: actions/github-script@v6
        id: idtoken
        with:
          script: |
            const core = require('@actions/core')
            return await core.getIDToken()
          result-encoding: string

      - name: Deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          action: "upload"
          app_location: "publish/wwwroot"
          output_location: ""
          skip_app_build: true
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_AMBITIOUS_ROCK_0C82AF610 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          github_id_token: ${{ steps.idtoken.outputs.result }}

      - name: Verify live site
        run: |
          echo "=== live root ==="
          curl -I https://ambitious-rock-0c82af610.1.azurestaticapps.net/ || true
          echo "=== live index ==="
          curl -I https://ambitious-rock-0c82af610.1.azurestaticapps.net/index.html || true
          echo "=== live manifest ==="
          curl -I https://ambitious-rock-0c82af610.1.azurestaticapps.net/manifest.json || true

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        uses: Azure/static-web-apps-deploy@v1
        with:
          action: "close"
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_AMBITIOUS_ROCK_0C82AF610 }}
